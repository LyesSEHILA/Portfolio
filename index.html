<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio MIAGE | Accueil</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="nav-links">
            <a href="index.html" class="active" data-i18n="nav_home">Accueil</a>
            <a href="travaux.html" data-i18n="nav_works">Travaux & Cours</a>
            <a href="projets.html" data-i18n="nav_projects">Projets & Certifs</a>
            <a href="ressources.html" data-i18n="nav_resources">Ressources</a>
        </div>
        <button id="lang-switch" class="lang-btn">
            <span class="lang-text">EN</span>
            <i class="fas fa-globe"></i>
        </button>
    </nav>

    <div class="container" style="text-align: center; margin-top: 5vh;">
        <header class="main-header">
            <div class="logos-top">
                <img src="assets/Logo_Université_Paris-Nanterre.svg.png" alt="Université Nanterre" class="fac-logo">
                <div class="divider"></div>
                <img src="assets/RTE_logo.png" alt="RTE Alternance" class="rte-logo">
            </div>
            
            <h1 class="hero-name">Lyes SEHILA</h1>
            <div class="hero-tags">
                <span class="tag">#FullStack</span>
                <span class="tag">#SaaS</span>
                <span class="tag">#Agile</span>
                <span class="tag">#RTE</span>
            </div>
        </header>
        
        <div class="card reveal about-card">
            <div class="glow-effect"></div>
            <h2 data-i18n="hero_profile"><i class="fas fa-user-graduate"></i> Profil Professionnel</h2>
            <div class="action-buttons">
                <a href="assets/CV à jour Lyes Sehila.pdf" target="_blank" class="btn btn-cv">
                    <i class="fas fa-file-download"></i>
                    <span data-i18n="btn_cv">Télécharger mon CV</span>
                </a>
                <a href="https://www.linkedin.com/in/sehilalyes/" target="_blank" class="btn btn-linkedin">
                    <i class="fab fa-linkedin"></i>
                    <span data-i18n="btn_linkedin">LinkedIn Network</span>
                </a>
            </div>
        </div>

        <div class="reveal" style="text-align: left; max-width: 1000px; margin: 0 auto; margin-top: 60px;">
            <h2 data-i18n="updates_title"><i class="fas fa-bolt" style="color: #fbbf24;"></i> Mises à jour récentes</h2>
            <p data-i18n="updates_subtitle" style="color: #cbd5e1; margin-bottom: 2rem;">Accès rapide aux derniers travaux et cours publiés sur le site.</p>
            
            <div id="updates-container" class="grid">
                <!-- Les mises à jour seront injectées ici par js/main.js -->
            </div>
        </div>
    </div>
    
    <script src="js/translations.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Petit script d'animation pour l'accueil
        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(() => {
                document.querySelectorAll('.reveal').forEach((el, index) => {
                    setTimeout(() => {
                        el.classList.add('active');
                    }, index * 200);
                });
            }, 100);
        });
    </script>
</body>
</html>
